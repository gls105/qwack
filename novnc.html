<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>qwack — Remote Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #e8e8e8; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #status { padding: 8px 12px; font-size: 12px; background: #141414; border-bottom: 1px solid #222; color: #f5c400; }
    #screen { flex: 1; overflow: hidden; }
    canvas { width: 100%; height: 100%; }
  </style>
  <!-- noVNC from CDN -->
  <script type="module">
    import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc@1.4.0/core/rfb.js';

    const params = new URLSearchParams(location.search);
    const host = params.get('host') || 'localhost';
    const port = params.get('port') || '5900';
    const password = params.get('password') || '';

    const statusEl = document.getElementById('status');
    const screen = document.getElementById('screen');

    statusEl.textContent = `Connecting to ${host}:${port}...`;

    const wsUrl = `ws://${host}:${port}`;

    try {
      const rfb = new RFB(screen, wsUrl, password ? { credentials: { password } } : {});
      rfb.scaleViewport = true;
      rfb.resizeSession = false;

      rfb.addEventListener('connect', () => { statusEl.textContent = `Connected — ${host}:${port}`; });
      rfb.addEventListener('disconnect', (e) => { statusEl.textContent = `Disconnected: ${e.detail.clean ? 'clean' : 'error'}`; });
      rfb.addEventListener('securityfailure', () => { statusEl.textContent = 'Security failure — check password'; });
    } catch (e) {
      statusEl.textContent = `Error: ${e.message}`;
    }
  </script>
</head>
<body>
  <div id="status">Initializing noVNC...</div>
  <div id="screen"></div>
</body>
</html>
